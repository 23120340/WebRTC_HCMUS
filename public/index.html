<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Group Call</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Vina+Sans&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Ambient orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <!-- ====== LOBBY ====== -->
  <div id="lobby" class="lobby">
    <div class="lobby-card">
      <div class="logo">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14"/>
          <rect x="3" y="6" width="12" height="12" rx="3"/>
        </svg>
      </div>
      <h1>WebRTC Call</h1>
      <p class="subtitle">Gọi video nhóm · Mesh topology · P2P</p>

      <div class="field">
        <label>Tên của bạn</label>
        <input id="inputName" type="text" placeholder="Nhập tên hiển thị..." maxlength="30" autocomplete="off">
      </div>

      <div class="field">
        <label>Mã phòng</label>
        <div class="row">
          <input id="inputRoom" type="text" placeholder="VD: lop-th01, abc123" maxlength="30" autocomplete="off">
          <button id="btnRandomRoom" type="button" title="Sinh ngẫu nhiên">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/>
              <polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/>
            </svg>
          </button>
        </div>
      </div>

      <button id="btnJoin" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Vào phòng
      </button>
      <p id="lobbyStatus" class="status"></p>
    </div>
  </div>

  <!-- ====== CALL ROOM ====== -->
  <div id="callRoom" class="call-room hidden">

    <header class="call-header">
      <div class="header-left">
        <span class="room-label">Phòng</span>
        <span id="roomIdDisplay" class="room-id-pill"></span>
        <button id="btnCopyRoom" title="Sao chép mã phòng">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
          </svg>
        </button>
      </div>
      <div class="header-right">
        <span id="myNameDisplay" class="my-name"></span>
      </div>
    </header>

    <main id="videoGrid" class="video-grid"></main>

    <aside id="chatPanel" class="chat-panel">
      <div class="chat-header">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
        Chat
      </div>
      <div id="chatMessages" class="chat-messages"></div>
      <div class="chat-input">
        <input id="chatInput" type="text" placeholder="Nhắn tin...">
        <button id="btnSendChat">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </aside>

    <footer class="controls">
      <button id="btnToggleMic" class="ctrl-btn" data-label="Tắt mic">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
          <path d="M19 10v2a7 7 0 01-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/>
          <line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>
      <button id="btnToggleCam" class="ctrl-btn" data-label="Tắt cam">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 10l4.553-2.069A1 1 0 0121 8.82v6.36a1 1 0 01-1.447.89L15 14"/>
          <rect x="3" y="6" width="12" height="12" rx="3"/>
        </svg>
      </button>
      <button id="btnLeave" class="ctrl-btn ctrl-btn--danger" data-label="Rời phòng">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
      </button>
      <button id="btnToggleChat" class="ctrl-btn" data-label="Chat">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
        </svg>
      </button>
    </footer>
  </div>

  <!-- Video tile template -->
  <template id="videoTileTemplate">
    <div class="video-tile">
      <video autoplay playsinline></video>
      <div class="tile-label"></div>
      <span class="conn-status" data-state="new" title="new"></span>
    </div>
  </template>

  <script src="ice-config.js"></script>
  <script src="app.js"></script>
</body>
</html>
